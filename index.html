<!DOCTYPE html>
<html>
<head>
  <title>Pizza Cart</title>
  <a href="custom.html">Build Your Own Pizza</a>
  <style>
    body { font-family: Arial; padding: 20px; }
    h2 { margin-top: 40px; }
    .pizza { margin-bottom: 20px; }
    button { padding: 5px 10px; margin-left: 10px; }
    #cart { margin-top: 30px; border-top: 2px solid black; padding-top: 20px; }
  </style>
</head>
<body>

<h1>🍕 Order Your Pizza</h1>

<div id="menu"></div>

<div id="cart">
  <h2>🛒 Cart</h2>
  <ul id="cart-items"></ul>
  <p id="empty">Cart is empty</p>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="clearCart()">Clear Cart</button>
  <button id="checkoutBtn" onclick="checkout()" style="display:none; margin-left:10px;">
    Proceed to Checkout
  </button>
  <p id="checkoutMessage" style="color:green; font-weight:bold;"></p>
</div>

<script>
const pizzas = ["Pepperoni", "Margherita", "Hawaiian", "BBQ Chicken", "Veggie Supreme"];
const prices = { Small: 10, Medium: 13, Large: 16 };

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const menuDiv = document.getElementById("menu");

pizzas.forEach(pizza => {
  let div = document.createElement("div");
  div.className = "pizza";
  div.innerHTML = `<strong>${pizza}</strong><br>`;
  
  Object.keys(prices).forEach(size => {
    div.innerHTML += `
      ${size} ($${prices[size]})
      <button onclick="addToCart('${pizza}', '${size}', ${prices[size]})">Add</button>
    `;
  });

  menuDiv.appendChild(div);
});

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, size, price) {
  cart.push({ name: `${name} (${size})`, price });
  saveCart();
  updateCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  saveCart();
  updateCart();
}

function clearCart() {
  cart = [];
  saveCart();
  updateCart();
}

function updateCart() {
  const cartItems = document.getElementById("cart-items");
  const totalSpan = document.getElementById("total");
  const emptyMsg = document.getElementById("empty");
  const checkoutBtn = document.getElementById("checkoutBtn");

  cartItems.innerHTML = "";
  let total = 0;

  if (cart.length === 0) {
    emptyMsg.style.display = "block";
    checkoutBtn.style.display = "none";
  } else {
    emptyMsg.style.display = "none";
    checkoutBtn.style.display = "inline-block";
  }

  cart.forEach((item, index) => {
    total += item.price;
    cartItems.innerHTML += `
      <li>
        ${item.name} - $${item.price}
        <button onclick="removeItem(${index})">Remove</button>
      </li>
    `;
  });

  totalSpan.innerText = total;
}

function checkout() {
  document.getElementById("checkoutMessage").innerText =
    "✅ Thank you for your order! (Demo Checkout)";
  cart = [];
  saveCart();
  updateCart();
}

updateCart();
</script>
</body>
</html>
